<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Basic Calculator</title>
</head>

<body>

    <h1>Basic Calculator</h1>

    <label>Number 1: <input type="number" id="num1" placeholder="Enter number"></label><br><br>

    <label>Operation:
        <select id="operation">
            <option value="+">+ (Add)</option>
            <option value="-">− (Subtract)</option>
            <option value="*">× (Multiply)</option>
            <option value="/">÷ (Divide)</option>
        </select>
    </label><br><br>

    <label>Number 2: <input type="number" id="num2" placeholder="Enter number"></label><br><br>

    <button onclick="calculate()">Calculate</button>

    <h2 id="result"></h2>

    <script src="calculator.js"></script>
</body>

</html>
