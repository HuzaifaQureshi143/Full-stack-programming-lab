<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task 3: Interactive Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Task 3: Interactive Form Validation</h2>
    <form id="myForm">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username">
            <span class="error-msg" id="usernameError">Username must be at least 3 characters.</span>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
            <span class="error-msg" id="emailError">Please enter a valid email address.</span>
        </div>
        <button type="submit" id="submitBtn">Submit</button>
    </form>
    <div id="successMessage" style="display:none;">Form submitted successfully!</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
